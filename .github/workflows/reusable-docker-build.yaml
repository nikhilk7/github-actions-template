name: Template Docker Build Pipeline

on:
  workflow_call:

    inputs:
      image_repository:
        required: true
        type: string

      build_command:
        required: true
        type: string

      dockerfile_path:
        required: true
        type: string

    secrets:
      DOCKER_USERNAME:
        required: true

      DOCKER_TOKEN:
        required: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Build Application
        run: ${{ inputs.build_command }}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Generate Image Tag
        run: echo "IMAGE_TAG=${GITHUB_RUN_NUMBER}-$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      - name: Build Docker Image
        run: |
          docker build -f ${{ inputs.dockerfile_path }} \
          -t ${{ secrets.DOCKER_USERNAME }}/${{ inputs.image_repository }}:${{ env.IMAGE_TAG }} .

          docker tag ${{ secrets.DOCKER_USERNAME }}/${{ inputs.image_repository }}:${{ env.IMAGE_TAG }} \
          ${{ secrets.DOCKER_USERNAME }}/${{ inputs.image_repository }}:latest

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/${{ inputs.image_repository }}:${{ env.IMAGE_TAG }}
          docker push ${{ secrets.DOCKER_USERNAME }}/${{ inputs.image_repository }}:latest